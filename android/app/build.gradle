apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'

android {
    // Android 14 target
    compileSdk 34
    namespace 'com.suryansh.naksha'

    defaultConfig {
        applicationId 'com.suryansh.naksha'
        minSdk 22
        targetSdk 34            // Android 14
        versionCode 1
        versionName '1.0'

        // Needed for vector drawables on API < 21
        vectorDrawables.useSupportLibrary = true
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    // Ensure Kotlin source set is included
    sourceSets {
        main {
            java.srcDirs += 'src/main/java'
        }
    }

    // App icon resource mapping
    // Maps to src/main/res/mipmap/ic_launcher.png (all densities)
    // Generated by @capacitor/assets from assets/icon-only.png
}

dependencies {
    // Capacitor core — provides BridgeActivity that MainActivity extends
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    implementation project(':capacitor-android')

    // Kotlin stdlib
    implementation 'org.jetbrains.kotlin:kotlin-stdlib:1.9.22'

    // AndroidX Core for ContextCompat, ActivityResultContracts
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.activity:activity-ktx:1.8.2'

    // Capacitor plugins
    implementation project(':capacitor-local-notifications')
    implementation project(':capacitor-filesystem')
    implementation project(':capacitor-preferences')
}
