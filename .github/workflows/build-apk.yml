name: Build Naksha APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          
      - name: Build frontend (src/frontend)
        run: |
          cd src/frontend
          pnpm install
          pnpm build
          mkdir -p $GITHUB_WORKSPACE/www
          cp -r dist/* $GITHUB_WORKSPACE/www/
          
      - name: Setup Capacitor (Workspace Fix)
        run: |
          pnpm add -w @capacitor/cli @capacitor/core @capacitor/android \
          @capacitor/local-notifications @capacitor/filesystem @capacitor/preferences
          
      - name: Android Sync & Repair
        run: |
          # Use the newly installed CLI to sync
          npx cap sync android
        
      - name: Build debug APK (Hardened)
        run: |
          cd android
          chmod +x gradlew
          # Using --no-daemon for stable memory management
          ./gradlew assembleDebug --no-daemon
          
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: naksha-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
