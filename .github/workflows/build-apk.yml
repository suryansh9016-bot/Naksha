name: Build Naksha APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Install pnpm & Branding Tools
        uses: pnpm/action-setup@v3
        with:
          version: 9
          
      - name: Build frontend
        run: |
          FRONTEND_PATH=$(find . -name "package.json" -not -path "*/node_modules/*" -printf '%h\n' | head -n 1)
          cd "$FRONTEND_PATH"
          pnpm install
          pnpm build
          mkdir -p $GITHUB_WORKSPACE/www
          cp -r dist/* $GITHUB_WORKSPACE/www/ || cp -r build/* $GITHUB_WORKSPACE/www/
          
      - name: Native Power & Icon Generation
        run: |
          # 1. Install all plugins + The Icon Generator Tool
          pnpm add -w @capacitor/cli @capacitor/core @capacitor/android \
          @capacitor/local-notifications @capacitor/filesystem @capacitor/preferences \
          @capacitor/assets
          
          # 2. Rebuild Android Engine
          rm -rf android
          npx cap add android
          
          # 3. Hunt for your icon and generate them
          # This command creates icons for every Android size automatically
          npx capacitor-assets generate --android --icon icon-only.png
          
          # 4. MANIFEST SURGERY: Granting Permissions
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/<application/i \    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" />' $MANIFEST
          
          npx cap sync android
        
      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-daemon
          
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: naksha-apk
          path: "android/app/build/outputs/apk/debug/app-debug.apk"
          retention-days: 7
