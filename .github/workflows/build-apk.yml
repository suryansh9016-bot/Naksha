name: Build Naksha APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          
      - name: Build frontend
        run: |
          FRONTEND_PATH=$(find . -name "package.json" -not -path "*/node_modules/*" -printf '%h\n' | head -n 1)
          cd "$FRONTEND_PATH"
          pnpm install
          pnpm build
          mkdir -p $GITHUB_WORKSPACE/www
          cp -r dist/* $GITHUB_WORKSPACE/www/ || cp -r build/* $GITHUB_WORKSPACE/www/
          
      - name: Force Rebuild Android Platform
        run: |
          # 1. Install CLI
          pnpm add -w @capacitor/cli @capacitor/core @capacitor/android
          
          # 2. If 'android' folder exists, remove it to ensure a clean engine
          rm -rf android
          
          # 3. Create a FRESH android project with your package details
          npx cap add android
          
          # 4. Sync the web files
          npx cap sync android
        
      - name: Build debug APK
        run: |
          # Now that we forced the creation, 'android' is guaranteed to be in the root
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: naksha-apk
          path: "android/app/build/outputs/apk/debug/app-debug.apk"
          retention-days: 7
