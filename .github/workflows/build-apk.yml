name: Build Naksha APK
on: [push]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Build frontend
        run: |
          FRONTEND_PATH=$(find . -name "package.json" -not -path "*/node_modules/*" -printf '%h\n' | head -n 1)
          cd "$FRONTEND_PATH"
          pnpm install
          pnpm build
          mkdir -p $GITHUB_WORKSPACE/www
          cp -r dist/* $GITHUB_WORKSPACE/www/ || cp -r build/* $GITHUB_WORKSPACE/www/
      - name: Force God-Mode & Icon Injection
        run: |
          pnpm add -w @capacitor/cli @capacitor/core @capacitor/android @capacitor/filesystem @capacitor/local-notifications
          
          rm -rf android
          npx cap add android
          
          # ICON INJECTION
          ICON_PATH=$(find . -name "icon-only.png" | head -n 1)
          if [ -n "$ICON_PATH" ]; then
            mkdir -p android/app/src/main/res/mipmap-mdpi
            cp "$ICON_PATH" android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          fi
          
          # MANIFEST SURGERY: Storage + Notifications
          MANIFEST=$(find android -name "AndroidManifest.xml" | grep "main")
          sed -i '/<application/i \    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />' $MANIFEST
          sed -i 's/<application/<application android:requestLegacyExternalStorage="true"/' $MANIFEST
          
          npx cap sync android
      - name: Build debug APK
        run: |
          GRADLE_PATH=$(find . -name "gradlew" -not -path "*/node_modules/*" -printf '%h\n' | head -n 1)
          cd "$GRADLE_PATH"
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-daemon
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: naksha-apk
          path: "**/app-debug.apk"
          retention-days: 7
