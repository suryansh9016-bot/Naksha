name: Build Naksha APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          
      - name: Build frontend
        run: |
          cd src/frontend
          pnpm install
          pnpm build
          # Ensure Capacitor sees the build output
          mkdir -p ../../www
          cp -r dist/* ../../www/
          
      - name: Setup Capacitor
        run: |
          pnpm add -w @capacitor/cli @capacitor/core @capacitor/android \
          @capacitor/local-notifications @capacitor/filesystem @capacitor/preferences
          
      - name: Android Sync & Repair
        run: |
          # Automatically find where the android folder is
          ANDROID_PATH=$(find . -name "gradlew" -printf '%h\n' | head -n 1)
          echo "Android project found at: $ANDROID_PATH"
          npx cap sync android
        
      - name: Build debug APK
        run: |
          # Dynamic navigation to the gradlew file
          ANDROID_PATH=$(find . -name "gradlew" -printf '%h\n' | head -n 1)
          cd "$ANDROID_PATH"
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: naksha-apk
          # Finds the APK regardless of the nested path
          path: "**/app-debug.apk"
          retention-days: 7
