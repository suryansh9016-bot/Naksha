name: Build Naksha Native-Hybrid APK
on: [push]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Build Frontend
        run: |
          FRONTEND_PATH=$(find . -name "package.json" -not -path "*/node_modules/*" -printf '%h\n' | head -n 1)
          cd "$FRONTEND_PATH"
          pnpm install
          pnpm build
          mkdir -p $GITHUB_WORKSPACE/www
          cp -r dist/* $GITHUB_WORKSPACE/www/ || cp -r build/* $GITHUB_WORKSPACE/www/
      - name: Kotlin Bridge & API 34 Surgery
        run: |
          pnpm add -w @capacitor/cli @capacitor/core @capacitor/android @capacitor/filesystem @capacitor/local-notifications
          rm -rf android
          npx cap add android
          
          # 1. NATIVE MANIFEST UPGRADE (API 34)
          MANIFEST=$(find android -name "AndroidManifest.xml" | grep "main")
          sed -i '/<application/i \    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />' $MANIFEST
          
          # 2. CONVERT JAVA TO KOTLIN BRIDGE
          JAVA_FILE=$(find android -name "MainActivity.java")
          KOTLIN_DIR=$(dirname "$JAVA_FILE")
          PACKAGE_NAME=$(grep "package" "$JAVA_FILE" | head -n 1)
          
          cat <<EOF > "$KOTLIN_DIR/MainActivity.kt"
          ${PACKAGE_NAME/;/}
          import android.os.Bundle
          import com.getcapacitor.BridgeActivity

          class MainActivity : BridgeActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
              }
          }
          EOF
          rm "$JAVA_FILE" # Remove the old Java bridge
          
          npx cap sync android
      - name: Build Gradle 8.0+ APK
        run: |
          GRADLE_PATH=$(find . -name "gradlew" -not -path "*/node_modules/*" -printf '%h\n' | head -n 1)
          cd "$GRADLE_PATH"
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-daemon
      - name: Upload Native APK
        uses: actions/upload-artifact@v4
        with:
          name: naksha-native-hybrid
          path: "**/app-debug.apk"
